[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
markers =
    asyncio: mark test as async

[tool:pytest]
addopts = -v --tb=short --strict-markers

[coverage:run]
source = scripts,ticket_platforms
omit = tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == "__main__":
    raise NotImplementedError
    def __repr__
