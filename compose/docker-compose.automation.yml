services:
  n8n:
    image: n8nio/n8n:latest
    container_name: helpdesk-n8n
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - ./data/n8n:/home/node/.n8n
    environment:
      - DB_TYPE=sqlite
      - N8N_EMAIL_MODE=none
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - N8N_HOST=localhost
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
